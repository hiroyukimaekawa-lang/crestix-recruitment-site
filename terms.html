<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サイト利用規約 - Crestix Recruitment</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed">
    <div class="max-w-4xl mx-auto px-6 py-20 bg-white shadow-sm min-h-screen">
        <h1 class="text-3xl font-black mb-10 border-b-4 border-orange-500 pb-4">サイト利用規約</h1>
        <div class="space-y-8 text-sm">
            <section>
                <h2 class="text-xl font-bold mb-4">1. 規約の適用</h2>
                <p>この規約は、株式会社Crestixが運営する採用サイト（以下「本サイト」）の利用に関わるすべての利用者に適用されます。</p>
            </section>
            <section>
                <h2 class="text-xl font-bold mb-4">2. 禁止事項</h2>
                <p>利用者は、本サイトの利用にあたり、以下の行為を行ってはならないものとします：</p>
                <ul class="list-disc pl-5 mt-2 space-y-1">
                    <li>虚偽の情報を提供または登録する行為</li>
                    <li>著作権、商標権等の知的財産権を侵害する行為</li>
                    <li>本サイトの運営を妨げる行為</li>
                </ul>
            </section>
        </div>
        <div class="mt-20 pt-10 border-t text-center">
            <a href="index.html" class="text-orange-600 font-bold">← トップページに戻る</a>
        </div>
    </div>
</body>
</html>
