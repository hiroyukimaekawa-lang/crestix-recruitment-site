<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プライバシーポリシー - Crestix Recruitment</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed">
    <div class="max-w-4xl mx-auto px-6 py-20 bg-white shadow-sm min-h-screen">
        <h1 class="text-3xl font-black mb-10 border-b-4 border-orange-500 pb-4">プライバシーポリシー</h1>
        <div class="space-y-8 text-sm">
            <section>
                <h2 class="text-xl font-bold mb-4">1. 個人情報の収集について</h2>
                <p>株式会社Crestix（以下「当社」）は、当社の採用活動において、応募者の皆様の個人情報を適正に収集いたします。</p>
            </section>
            <section>
                <h2 class="text-xl font-bold mb-4">2. 利用目的</h2>
                <p>収集した個人情報は、以下の目的でのみ利用いたします：</p>
                <ul class="list-disc pl-5 mt-2 space-y-1">
                    <li>採用選考および合否の連絡</li>
                    <li>採用決定後の入社手続き</li>
                    <li>統計情報の作成（個人を特定できない形での利用）</li>
                </ul>
            </section>
        </div>
        <div class="mt-20 pt-10 border-t text-center">
            <a href="index.html" class="text-orange-600 font-bold">← トップページに戻る</a>
        </div>
    </div>
</body>
</html>
